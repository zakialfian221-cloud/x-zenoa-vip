<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3X V4 ULTIMATE | BG KIY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { --neon: #ff0000; --bg: #030000; --glow: 0 0 15px rgba(255, 0, 0, 0.7); }
        
        body {
            background-color: var(--bg); color: #fff;
            font-family: 'Share Tech Mono', monospace; margin: 0; padding: 15px;
            min-height: 100vh; overflow-x: hidden;
            border: 2px solid #300;
        }

        /* ANIMASI BACKGROUND SCAN */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,0,0,0.03) 0px, rgba(255,0,0,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 10;
        }

        .header { 
            text-align: center; margin-bottom: 20px; border: 2px double var(--neon); 
            padding: 15px; background: rgba(20,0,0,0.8); box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .header h1 { font-family: 'Orbitron'; font-size: 22px; color: var(--neon); margin: 0; text-shadow: var(--glow); }

        /* BOX LOG DENGAN SCROLL */
        #console {
            background: #000; border: 1px solid #444; height: 100px; 
            font-size: 10px; color: #0f0; overflow-y: auto; padding: 8px; margin-bottom: 20px;
            box-shadow: inset 0 0 10px #030;
        }

        .card {
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 12px; margin-bottom: 12px; position: relative;
            transition: 0.3s;
        }
        .card:active { border-color: var(--neon); box-shadow: var(--glow); }
        .card-title { font-size: 11px; color: var(--neon); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }

        /* BUTTON LAUNCHER */
        .btn-launch {
            width: 100%; padding: 20px; background: #900; color: #fff;
            border: none; font-family: 'Orbitron'; font-weight: 900;
            font-size: 16px; cursor: pointer; letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            margin-top: 10px; transition: 0.2s;
        }
        .btn-launch:hover { background: #f00; box-shadow: 0 0 30px #f00; }

        /* FAKE DIAMOND COUNTER */
        .dm-box { display: flex; align-items: center; justify-content: center; gap: 10px; color: #0cf; font-weight: bold; margin-bottom: 10px;}
        
        .status-dot { height: 10px; width: 10px; background: #0f0; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-inject" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div class="header">
        <h1>R3X SUPREME V4</h1>
        <p style="font-size: 10px; color: #888;">COMMISSIONER: BG KIY | <span class="status-dot"></span> ONLINE</p>
    </div>

    <div id="console">> System standby...</div>

    <div class="card">
        <div class="dm-box">
            <img src="https://garenashell.id/assets/images/diamond.png" width="20" alt="dm">
            <span id="dm-count">999,999</span>
        </div>
        <div class="card-title">CURRENCY MODIFIER (VISUAL)</div>
        <button onclick="addDm()" style="width:100%; background:#111; color:#0cf; border:1px solid #0cf; font-family:inherit; padding:5px;">GENERATE DIAMONDS</button>
    </div>

    <div class="card">
        <div class="card-title">AIM CONTROL & ESP</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>AIMLOCK (AUTO)</span>
            <button onclick="playBtn(); addLog('Aimlock: ON')" style="background:#0f0; border:none; padding:2px 10px; font-size:10px;">AKTIFKAN</button>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <span>ANTENNA VIEW</span>
            <button onclick="playBtn(); addLog('Antenna: ON')" style="background:#0f0; border:none; padding:2px 10px; font-size:10px;">AKTIFKAN</button>
        </div>
    </div>

    <button class="btn-launch" onclick="execute()">LAUNCH FREE FIRE</button>

    <script>
        let audioStarted = false;

        // Inisialisasi Audio (Harus ada interaksi user pertama kali)
        function initAudio() {
            if(!audioStarted) {
                speak("Welcome back, Commissioner BG KIY. System R3X version four is ready to inject.");
                addLog("System Voice Activated...");
                audioStarted = true;
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-US'; // Suara robot cewek bahasa Inggris biar mewah
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function addLog(text) {
            const console = document.getElementById('console');
            console.innerHTML += `> ${text}<br>`;
            console.scrollTop = console.scrollHeight;
            document.getElementById('snd-click').play();
        }

        function addDm() {
            speak("Generating unlimited diamonds to your account.");
            addLog("Injecting Diamonds...");
            let count = 0;
            let interval = setInterval(() => {
                count += 12345;
                document.getElementById('dm-count').innerText = count.toLocaleString();
                if(count > 999999) {
                    clearInterval(interval);
                    addLog("Diamond Injection Success!");
                }
            }, 50);
        }

        function playBtn() {
            document.getElementById('snd-click').play();
        }

        function execute() {
            document.getElementById('snd-inject').play();
            speak("Injection process complete. Opening Free Fire now. Good luck, BG KIY.");
            addLog("Executing Deep Link...");
            setTimeout(() => {
                window.location.href = "intent:#Intent;package=com.dts.freefireth;end";
            }, 2000);
        }
    </script>
</body>
            </html>
