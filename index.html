<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X3_CYBER_CALCULATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0f0;
        }
        .calc-body {
            background: #000;
            width: 320px;
            padding: 20px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            border-radius: 10px;
        }
        #display {
            width: 100%;
            height: 60px;
            background: #0a0a0a;
            border: 1px solid #0f0;
            margin-bottom: 20px;
            text-align: right;
            padding: 15px;
            font-size: 24px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 50px;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }
        .btn-op { color: #0ff; border-color: #0ff; }
        .btn-eq { grid-column: span 2; color: #ff0; border-color: #ff0; }
        .btn-clear { grid-column: span 2; color: #f00; border-color: #f00; }
    </style>
</head>
<body>

    <div class="calc-body">
        <input type="text" id="display" readonly value="0">
        <div class="buttons">
            <button class="btn-clear" onclick="clearDisplay()">CLEAR</button>
            <button class="btn-op" onclick="del()">DEL</button>
            <button class="btn-op" onclick="input('/')">/</button>
            
            <button onclick="input('7')">7</button>
            <button onclick="input('8')">8</button>
            <button onclick="input('9')">9</button>
            <button class="btn-op" onclick="input('*')">*</button>
            
            <button onclick="input('4')">4</button>
            <button onclick="input('5')">5</button>
            <button onclick="input('6')">6</button>
            <button class="btn-op" onclick="input('-')">-</button>
            
            <button onclick="input('1')">1</button>
            <button onclick="input('2')">2</button>
            <button onclick="input('3')">3</button>
            <button class="btn-op" onclick="input('+')">+</button>
            
            <button onclick="input('0')">0</button>
            <button onclick="input('.')">.</button>
            <button class="btn-eq" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function input(v) {
            if (display.value === '0') display.value = v;
            else display.value += v;
        }

        function clearDisplay() {
            display.value = '0';
        }

        function del() {
            display.value = display.value.slice(0, -1);
            if (display.value === '') display.value = '0';
        }

        function calculate() {
            try {
                // eval() aman di sini karena input dikontrol tombol
                display.value = eval(display.value);
            } catch (e) {
                display.value = 'ERROR';
                setTimeout(clearDisplay, 1000);
            }
        }
    </script>
</body>
</html>
