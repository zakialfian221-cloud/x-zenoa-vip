<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3X V3 SUPREME | BG KIY</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { --neon: #ff0000; --bg: #050000; --glow: rgba(255, 0, 0, 0.5); }
        
        body {
            background-color: var(--bg); color: #fff;
            font-family: 'Share Tech Mono', monospace; margin: 0; padding: 10px;
            min-height: 98vh; overflow-x: hidden;
            border: 2px solid #200;
        }

        /* HEADER DENGAN ANIMASI */
        .header { text-align: center; margin-bottom: 15px; border: 1px solid var(--neon); padding: 10px; box-shadow: 0 0 15px var(--glow); }
        .header h1 { font-family: 'Orbitron'; font-size: 20px; color: var(--neon); margin: 0; letter-spacing: 2px; }

        /* LOG INJECTOR (BIAR KEREN) */
        #log-box {
            background: #000; border: 1px solid #333; height: 80px; 
            font-size: 9px; color: #0f0; overflow-y: hidden; padding: 5px; margin-bottom: 15px;
        }

        /* CARD STYLE */
        .card {
            background: rgba(15, 0, 0, 0.9); border: 1px solid #444;
            padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--neon);
        }
        .card-title { font-size: 11px; color: var(--neon); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #600, #f00);
            color: white; border: none; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; text-shadow: 0 0 5px #000; margin-top: 5px;
        }
        .btn-main:active { transform: scale(0.95); }

        /* CHECKBOX CUSTOM */
        .row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .status { color: #555; font-weight: bold; transition: 0.3s; }
        .active { color: #0f0; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>R3X OVERLORD V3</h1>
        <p style="font-size: 9px; margin: 0;">LICENSE: BG-KIY-OFFICIAL-2026</p>
    </div>

    <div id="log-box">
        > System Initializing...<br>
        > Checking Device: SAMSUNG A04...<br>
        > Status: Security Bypassed...
    </div>

    <div class="card">
        <div class="card-title">AIMBOT CONFIG (VIP)</div>
        <div class="row">Auto Headshot <span class="status" id="s1">OFF</span></div>
        <input type="range" oninput="activate(1)">
        <div class="row" style="margin-top:10px;">Aim Lock 100% <span class="status" id="s2">OFF</span></div>
        <input type="range" oninput="activate(2)">
    </div>

    <div class="card">
        <div class="card-title">VISUAL & ESP</div>
        <div class="row">Antenna View 1000M <span class="status" id="s3">OFF</span></div>
        <div class="row">Wallhack (VVIP) <span class="status" id="s4">OFF</span></div>
        <button onclick="activate(3); activate(4);" style="font-size:10px; background:#222; color:#fff; border:1px solid #444;">ACTIVATE ALL ESP</button>
    </div>

    <button class="btn-main" onclick="launchFF()">EXECUTE & LAUNCH FF</button>

    <script>
        // Animasi Log
        const logBox = document.getElementById('log-box');
        const logs = [
            "> Connecting to Garena Server...",
            "> Injecting Cheat Pack v3.2...",
            "> Bypassing Anticheat...",
            "> Success! System Ready.",
            "> Waiting for Launch Command..."
        ];
        let i = 0;
        setInterval(() => {
            if(i < logs.length) {
                logBox.innerHTML += logs[i] + "<br>";
                i++;
            }
        }, 1500);

        function activate(id) {
            document.getElementById('s' + id).innerText = "ACTIVE";
            document.getElementById('s' + id).classList.add('active');
        }

        function launchFF() {
            alert("INJEKSI BERHASIL, BG KIY!\nPanel akan tetap berjalan di background.");
            window.location.href = "intent:#Intent;package=com.dts.freefireth;end";
        }
    </script>
</body>
    </html>
