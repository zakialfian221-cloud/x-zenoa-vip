<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3X PANEL FF | BG KIY</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body {
            background-color: #050505; color: #fff;
            font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px;
            background-image: radial-gradient(circle, #200000 0%, #050505 100%);
        }

        .header { text-align: center; border-bottom: 2px solid #ff0000; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #ff0000; text-shadow: 0 0 10px #ff0000; font-size: 24px; margin: 0; }
        .header p { font-size: 10px; color: #aaa; letter-spacing: 2px; }

        /* PANEL CARD */
        .card {
            background: rgba(20, 20, 20, 0.9); border: 1px solid #333;
            padding: 15px; margin-bottom: 15px; border-left: 4px solid #ff0000;
        }
        .card-title { font-size: 12px; color: #ff0000; margin-bottom: 10px; font-weight: bold; }

        /* SWITCH STYLE */
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .status-on { color: #00ff00; font-weight: bold; font-size: 12px; }

        /* SENSI SLIDER (VISUAL ONLY) */
        input[type=range] { width: 100%; accent-color: #ff0000; }

        .btn-inject {
            width: 100%; padding: 15px; background: #ff0000; color: #fff;
            border: none; font-family: 'Orbitron'; font-weight: bold;
            cursor: pointer; margin-top: 10px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }
        .btn-inject:active { transform: scale(0.95); background: #b30000; }

        #installArea { display: none; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="installArea">
        <button onclick="installApp()" style="background:#fff; color:#000; padding:5px 15px; border:none; font-family:inherit; font-size:10px;">PASANG PANEL DI HP</button>
    </div>

    <div class="header">
        <h1>R3X PANEL V1</h1>
        <p>IDENTITAS: BG KIY | STATUS: TERHUBUNG</p>
    </div>

    <div class="card">
        <div class="card-title">PENGATURAN SENSI (AUTO HEADSHOT)</div>
        <div class="row">Lihat Sekeliling <span>100%</span></div>
        <input type="range" value="100">
        <div class="row" style="margin-top:10px;">Red Dot Sight <span>95%</span></div>
        <input type="range" value="95">
    </div>

    <div class="card">
        <div class="card-title">FITUR AKTIF</div>
        <div class="row">Aimbot Global <span class="status-on">AKTIF</span></div>
        <div class="row">Antena View <span class="status-on">AKTIF</span></div>
        <div class="row">No Recoil <span class="status-on">AKTIF</span></div>
    </div>

    <button class="btn-inject" onclick="playSfx()">INJECT TO GAME</button>

    <div style="text-align: center; font-size: 9px; color: #444; margin-top: 30px;">
        DATABASE ENKRIPSI BY BG KIY &copy; 2026
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        let defPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); defPrompt = e;
            document.getElementById('installArea').style.display = 'block';
        });

        function installApp() {
            if(defPrompt) {
                defPrompt.prompt();
                defPrompt.userChoice.then((choice) => {
                    if(choice.outcome === 'accepted') document.getElementById('installArea').style.display = 'none';
                });
            }
        }

        function playSfx() {
            document.getElementById('beep').play();
            alert("SISTEM BERHASIL DI-INJECT KE FREE FIRE!\nSelamat bermain, BG KIY.");
        }
    </script>
</body>
</html>
