<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X3_R3X_SYSTEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; 
            color: #0ff; 
            font-family: sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }
        #status {
            position: absolute;
            top: 10px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0ff;
            font-weight: bold;
            letter-spacing: 2px;
        }
        canvas {
            display: block;
            border: 2px solid #0ff;
            background: #000;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            touch-action: none; /* Penting buat kontrol HP */
        }
    </style>
</head>
<body>

    <div id="status">X3_SYSTEM // SCORE: <span id="score">0</span></div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score");

    // Setting Ukuran Responsif
    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.8;

    let score = 0;
    let gameActive = true;

    // Objek Bola (Neon Pink)
    const ball = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 10,
        speedX: 5,
        speedY: 5,
        color: "#ff00ff"
    };

    // Objek Pedal (Neon Cyan)
    const paddle = {
        width: 120,
        height: 15,
        x: (canvas.width - 120) / 2,
        y: canvas.height - 40,
        color: "#00ffff"
    };

    // Kontrol Sentuh (Touch Control)
    canvas.addEventListener("touchmove", (e) => {
        let rect = canvas.getBoundingClientRect();
        let touchX = e.touches[0].clientX - rect.left;
        paddle.x = touchX - paddle.width / 2;

        // Batasi biar gak keluar canvas
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        
        e.preventDefault();
    }, { passive: false });

    function draw() {
        if (!gameActive) return;

        // Effect Trail (Bikin bayangan halus)
        ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Gambar Bola
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = ball.color;
        ctx.fill();
        ctx.closePath();

        // Gambar Pedal
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 5);
        ctx.fillStyle = paddle.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = paddle.color;
        ctx.fill();
        ctx.closePath();

        // Logika Pergerakan Bola
        ball.x += ball.speedX;
        ball.y += ball.speedY;

        // Pantulan Dinding Samping
        if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
            ball.speedX = -ball.speedX;
        }

        // Pantulan Dinding Atas
        if (ball.y - ball.radius < 0) {
            ball.speedY = -ball.speedY;
        }

        // Pantulan Pedal
        if (ball.y + ball.radius > paddle.y && 
            ball.x > paddle.x && 
            ball.x < paddle.x + paddle.width) {
            
            ball.speedY = -Math.abs(ball.speedY); // Balik arah ke atas
            score++;
            scoreDisplay.innerText = score;
            
            // Efek Speed Up tiap skor nambah
            ball.speedX *= 1.02;
            ball.speedY *= 1.02;
        }

        // Game Over (Bola jatuh)
        if (ball.y - ball.radius > canvas.height) {
            gameActive = false;
            alert("R3X SYSTEM CRITICAL ERROR! Score: " + score);
            location.reload();
        }

        requestAnimationFrame(draw);
    }

    // Start System
    draw();
</script>
</body>
</html>
