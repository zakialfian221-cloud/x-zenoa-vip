<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3X V3 - THE DIGITAL NEXUS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { --neon: #ff0000; --bg: #050000; }
        
        body {
            background-color: var(--bg); color: #fff;
            font-family: 'Share Tech Mono', monospace; margin: 0; padding: 10px;
            background-image: radial-gradient(circle, #200000 0%, #000 100%);
            border: 2px solid #300; min-height: 98vh; overflow-x: hidden;
        }

        /* ANIMASI RADAR */
        .radar {
            position: fixed; top: 50%; left: 50%; width: 200px; height: 200px;
            border: 1px solid rgba(255,0,0,0.2); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 0;
        }
        .radar::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent, rgba(255,0,0,0.4));
            border-radius: 50%; animation: rotate 3s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .header { text-align: center; margin-bottom: 20px; z-index: 5; position: relative; }
        .header h1 { font-family: 'Orbitron'; font-size: 22px; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0; }

        /* FLOATING MENU STYLE */
        .card {
            background: rgba(10,0,0,0.85); border: 1px solid #400;
            padding: 12px; margin-bottom: 10px; position: relative; z-index: 5;
            backdrop-filter: blur(5px); box-shadow: 0 0 10px rgba(255,0,0,0.1);
        }
        .card-title { font-size: 11px; color: var(--neon); border-bottom: 1px solid #400; margin-bottom: 8px; font-weight: bold; }

        .btn-action {
            width: 100%; padding: 12px; background: #900; color: #fff;
            border: 1px solid var(--neon); font-family: 'Orbitron'; cursor: pointer;
            margin-top: 5px; font-weight: bold; font-size: 12px;
        }

        /* LIVE COORDINATES */
        #coords { font-size: 9px; color: #0f0; margin: 10px 0; height: 15px; }

        /* PULSING STATUS */
        .dot { height: 8px; width: 8px; background-color: #0f0; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="radar"></div>

    <div class="header">
        <h1>R3X PANEL V3</h1>
        <div id="coords">X: 192.168.1.1 | Y: 0.00342</div>
        <div style="font-size: 10px;"><span class="dot"></span> SYSTEM ONLINE: BG KIY</div>
    </div>

    <div class="card">
        <div class="card-title">MODUL INJEKSI (AUTO ON)</div>
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span>ANTENNA VIEW</span> <span style="color:#0f0">ACTIVE</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:5px;">
            <span>AUTO HEADSHOT</span> <span style="color:#0f0">99%</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">SETTINGAN SENSI VIP</div>
        <button class="btn-action" onclick="copySensi()" style="background:#222; font-size:10px;">COPY DATA CONFIG</button>
    </div>

    <div class="card">
        <div class="card-title">VIRTUAL LAUNCHER</div>
        <button class="btn-action" onclick="launchGame()">EXECUTE & OPEN FF</button>
    </div>

    <div style="text-align: center; color: #444; font-size: 8px; margin-top: 20px;">
        SECURITY BYPASS: BYPASSED <br>
        DEVELOPED BY R3X CLOUD
    </div>

    <audio id="soundEnter" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        // Efek koordinat jalan terus
        setInterval(() => {
            let x = Math.random() * 1000;
            let y = Math.random() * 1000;
            document.getElementById('coords').innerText = `X: ${x.toFixed(4)} | Y: ${y.toFixed(4)} | TARGET: LOCKED`;
        }, 100);

        function copySensi() {
            navigator.clipboard.writeText("Sensi FF: 100, 95, 80, 75 (R3X CONFIG)");
            alert("CONFIG BERHASIL DISALIN!\nTempel di folder data Free Fire lo, BG KIY.");
        }

        function launchGame() {
            document.getElementById('soundEnter').play();
            alert("MENGAKTIFKAN FLOATING OVERLAY...\nSISTEM SIAP DIGUNAKAN!");
            
            // Mencoba membuka FF
            setTimeout(() => {
                window.location.href = "intent:#Intent;package=com.dts.freefireth;end";
            }, 1000);
        }
    </script>
</body>
</html>
